name: deploy-main

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate --with-form

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Update code on server
        run: |
          ssh -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} &&
            git fetch origin &&
            git checkout main &&
            git reset --hard origin/main &&
            if command -v composer >/dev/null 2>&1; then
              COMPOSER_BIN=composer;
            elif [ -x /opt/cpanel/composer/bin/composer ]; then
              COMPOSER_BIN=/opt/cpanel/composer/bin/composer;
            elif [ -x /usr/local/bin/composer ]; then
              COMPOSER_BIN=/usr/local/bin/composer;
            elif [ -f composer.phar ]; then
              COMPOSER_BIN='php composer.phar';
            else
              echo 'Composer nao encontrado no servidor.';
              exit 1;
            fi &&
            \$COMPOSER_BIN install --no-dev --prefer-dist --optimize-autoloader --no-interaction &&
            php artisan migrate --force &&
            php artisan optimize:clear &&
            php artisan storage:link || true &&
            php artisan config:cache &&
            php artisan route:cache &&
            php artisan view:cache
          "

      - name: Upload built assets
        run: |
          scp -P ${{ secrets.DEPLOY_PORT }} -r public/build \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/public/
